spring:
  application:
    name: tg

telegram:
  bot:
    enabled: ${TELEGRAM_BOT_ENABLED:true}
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME:reu_smart_bit_bot}
  target-chat-id: ${TELEGRAM_TARGET_CHAT_ID:-1003999451875}

backend:
  url: ${BACKEND_URL:http://host.docker.internal:8080}

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  ad-created-topic: ${KAFKA_AD_CREATED_TOPIC:ad-created}
  ad-finished-topic: ${KAFKA_AD_FINISHED_TOPIC:ad-finished}
  consumer:
    enabled: ${KAFKA_CONSUMER_ENABLED:true}
    group-id: ${KAFKA_CONSUMER_GROUP_ID:smartbid-tg}

server:
  port: ${SERVER_PORT:8000}

logging:
  level:
    org.telegram: WARN
    smartbid.tg: INFO
