name: CI/CD

on:
  push:
    branches:
      - dev
      - SB-*
  pull_request:
    branches:
      - dev
  workflow_dispatch:

env:
  IMAGE_NAME: smartbid-tg
  REGISTRY: ghcr.io

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build jar
        run: mvn -B -DskipTests package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartbid-tg-jar
          path: target/*.jar
          if-no-files-found: error

  docker-build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/dev'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME: ${{ vars.TELEGRAM_BOT_USERNAME }}
          TELEGRAM_TARGET_CHAT_ID: ${{ secrets.TELEGRAM_TARGET_CHAT_ID }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ vars.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_AD_CREATED_TOPIC: ${{ vars.KAFKA_AD_CREATED_TOPIC }}
          KAFKA_AD_FINISHED_TOPIC: ${{ vars.KAFKA_AD_FINISHED_TOPIC }}
          KAFKA_CONSUMER_GROUP_ID: ${{ vars.KAFKA_CONSUMER_GROUP_ID }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE,TELEGRAM_BOT_TOKEN,TELEGRAM_BOT_USERNAME,TELEGRAM_TARGET_CHAT_ID,BACKEND_URL,KAFKA_BOOTSTRAP_SERVERS,KAFKA_AD_CREATED_TOPIC,KAFKA_AD_FINISHED_TOPIC,KAFKA_CONSUMER_GROUP_ID,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker pull "$IMAGE"
            docker stop smartbid-tg-app || true
            docker rm smartbid-tg-app || true
            docker run -d \
              --name smartbid-tg-app \
              --restart unless-stopped \
              --network smartbid-backend_default \
              -p 8000:8000 \
              -e TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
              -e TELEGRAM_BOT_USERNAME="${TELEGRAM_BOT_USERNAME:-reu_smart_bit_bot}" \
              -e TELEGRAM_TARGET_CHAT_ID="$TELEGRAM_TARGET_CHAT_ID" \
              -e BACKEND_URL="${BACKEND_URL:-http://smartbid-backend:8080}" \
              -e KAFKA_BOOTSTRAP_SERVERS="${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}" \
              -e KAFKA_AD_CREATED_TOPIC="${KAFKA_AD_CREATED_TOPIC:-ad-created}" \
              -e KAFKA_AD_FINISHED_TOPIC="${KAFKA_AD_FINISHED_TOPIC:-ad-finished}" \
              -e KAFKA_CONSUMER_GROUP_ID="${KAFKA_CONSUMER_GROUP_ID:-smartbid-tg}" \
              -e KAFKA_CONSUMER_ENABLED=true \
              "$IMAGE"
